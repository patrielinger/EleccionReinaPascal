<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="css/style.css">
    <style id="categoryStyles"></style>
</head>
<body>
    <h1>Panel de Administración</h1>
    <button id="logout">Cerrar Sesión</button>
    <div id="ranking">
        <h2>Ranking Actual</h2>
        <div id="rankingContent"></div>
    </div>
    <div id="voting-controls">
        <h2>Controles de Votación</h2>
        <div id="voting-buttons">
            <button id="clearVotesBtn" class="danger-btn">Eliminar Todos los Votos</button>
            <button id="blockVotingBtn">Bloquear Votaciones</button>
            <button id="enableVotingBtn" style="display:none;">Reactivar Votaciones</button>
        </div>
        <div id="votingStatus">Estado: Votaciones activas</div>
    </div>
    <div id="category-management">
        <h2>Categorías de Votación</h2>
        <form id="addCategoryForm" class="category-form">
            <input type="text" id="newCategory" placeholder="Nombre de la categoría" required>
            <input type="color" id="newCategoryColor" value="#ff6fe7" title="Selecciona un color para la categoría">
            <button type="submit">Agregar Categoría</button>
        </form>
        <div id="categoryList"></div>
    </div>
    <div id="confirmationModal" class="modal">
        <div class="modal-content">
            <span id="confirmationModalClose" class="close">&times;</span>
            <h2 id="confirmationModalTitle">Confirmación</h2>
            <p id="confirmationModalMessage"></p>
            <div class="button-group">
                <button id="confirmationCancelBtn">Cancelar</button>
                <button id="confirmationConfirmBtn">Confirmar</button>
            </div>
        </div>
    </div>
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <span id="messageModalClose" class="close">&times;</span>
            <h2 id="messageModalTitle">Aviso</h2>
            <p id="messageModalMessage"></p>
            <div class="button-group">
                <button id="messageModalOkBtn">Aceptar</button>
            </div>
        </div>
    </div>
    <div id="admin-forms">
        <div id="candidatas">
            <h2>Agregar Candidata</h2>
            <form id="addCandidataForm">
                <input type="text" id="nombre" placeholder="Nombre completo" required>
                <input type="text" id="ano" placeholder="Año del secundario" required>
                <textarea id="descripcion" placeholder="Descripción" required></textarea>
                <input type="text" id="cancion" placeholder="Canción elegida" required>
                <input type="number" id="numero" placeholder="Número de candidata" required>
                <input type="file" id="foto" accept="image/*">
                <button type="submit">Agregar Candidata</button>
            </form>
        </div>
        <div class="separator"></div>
        <div id="usuarios">
            <h2>Agregar Usuario</h2>
            <form id="addUserForm">
                <input type="text" id="userUsername" placeholder="Usuario" required>
                <input type="password" id="userPassword" placeholder="Contraseña" required>
                <button type="submit">Agregar Usuario</button>
            </form>
            <div id="usuariosList"></div>
        </div>
    </div>
    <div id="candidatas-preview">
        <h2>Lista de Candidatas</h2>
        <div id="candidatasGridAdmin"></div>
    </div>
    <script>
        // Función para verificar que la sesión es válida
        async function verifySession() {
            let currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'index.html';
                return false;
            }
            
            try {
                const response = await fetch('/api/verify-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: currentUser.username,
                        session_id: currentUser.session_id,
                        device_id: currentUser.device_id
                    })
                });
                
                const data = await response.json();
                
                if (!data.valid) {
                    // Sesión inválida - otro dispositivo está usando esta cuenta
                    localStorage.removeItem('currentUser');
                    console.log('Mostrando alerta de sesión expirada');
                    alert('⚠️ Sesión expirada: Tu usuario está conectado desde otro dispositivo');
                    window.location.href = 'index.html';
                    return false;
                }
                return true;
            } catch (error) {
                // Si el servidor no responde, asumir que es válido (fallback)
                console.log('Verificación de sesión: modo fallback');
                return true;
            }
        }
        
        // Verificar sesión al cargar
        verifySession().then(valid => {
            if (valid) {
                initAdmin();
            }
        });
        
        function initAdmin() {
            let currentUser = JSON.parse(localStorage.getItem('currentUser'));
            let candidatas = JSON.parse(localStorage.getItem('candidatas')) || [];
            let usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
            let votos = JSON.parse(localStorage.getItem('votos')) || {};
            let categorias = normalizeCategories(JSON.parse(localStorage.getItem('categorias')) || []);
            const defaultCategorias = [
                { name: 'Reina', color: '#ff6fe7' },
                { name: 'Primera Princesa', color: '#e6fa33' },
                { name: 'Segunda Princesa', color: '#e6fa33' },
                { name: 'Primera Dama de Honor', color: '#1fff40' },
                { name: 'Segunda Dama de Honor', color: '#1fff40' }
            ];
            let votingEnabled = true;

            if (!categorias.length) {
                categorias = defaultCategorias.slice();
            }

            function slugify(text) {
                return String(text).toLowerCase().trim()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/[^a-z0-9]+/g, '-')
                    .replace(/^-+|-+$/g, '');
            }

            function normalizeCategory(category) {
                if (!category) return null;
                if (typeof category === 'string') {
                    return { name: category, color: '#ff6fe7' };
                }
                if (typeof category === 'object' && category.name) {
                    return {
                        name: String(category.name).trim(),
                        color: category.color || '#ff6fe7'
                    };
                }
                return null;
            }

            function normalizeCategories(raw) {
                if (!Array.isArray(raw)) return [];
                return raw.map(normalizeCategory).filter(Boolean);
            }

            function updateCategoryStyles() {
                const styleEl = document.getElementById('categoryStyles');
                if (!styleEl) return;
                const styles = categorias.map(cat => {
                    const selector = slugify(cat.name);
                    return `.${selector} > h3 { color: ${cat.color}; outline: 1px solid ${cat.color}; box-shadow: 0 0 10px ${cat.color}; width: 100%; height: auto; border-radius: 5px; padding: 5px; }`;
                }).join('\n');
                styleEl.textContent = styles;
            }

            fetch('/api/load-data')
                .then(response => response.json())
                .then(data => {
                    if (data.candidatas) {
                        candidatas = data.candidatas;
                        localStorage.setItem('candidatas', JSON.stringify(candidatas));
                    }
                    if (data.votos) {
                        votos = data.votos;
                        localStorage.setItem('votos', JSON.stringify(votos));
                    }
                    if (data.categorias) {
                        categorias = normalizeCategories(data.categorias);
                        localStorage.setItem('categorias', JSON.stringify(categorias));
                    }
                    updateCategoryStyles();
                    renderCategoryList();
                    loadCandidatas();
                    loadUsuarios();
                })
                .catch(e => {
                    console.log('Error cargando datos del servidor:', e);
                    updateCategoryStyles();
                    renderCategoryList();
                    loadCandidatas();
                    loadUsuarios();
                });

        function saveData() {
            localStorage.setItem('candidatas', JSON.stringify(candidatas));
            localStorage.setItem('usuarios', JSON.stringify(usuarios));
            localStorage.setItem('votos', JSON.stringify(votos));
            localStorage.setItem('categorias', JSON.stringify(categorias));
            
            // Guardar en servidor
            fetch('/api/save-candidatas', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({candidatas})
            }).catch(e => console.log('Error guardando candidatas:', e));
            
            fetch('/api/save-usuarios', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({usuarios})
            }).catch(e => console.log('Error guardando usuarios:', e));
            
            fetch('/api/save-votos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({votos})
            }).catch(e => console.log('Error guardando votos:', e));
            
            fetch('/api/save-categorias', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({categorias})
            }).catch(e => console.log('Error guardando categorías:', e));
        }

        function renderCategoryList() {
            const list = document.getElementById('categoryList');
            if (!categorias.length) {
                list.innerHTML = '<p>No hay categorías definidas.</p>';
                return;
            }
            list.innerHTML = categorias.map(cat => `
                <div class="category-item">
                    <span><span class="category-swatch" style="background:${cat.color}"></span>${cat.name}</span>
                    <button type="button" class="delete-category-btn" data-category="${cat.name}">Eliminar</button>
                </div>
            `).join('');

            list.querySelectorAll('.delete-category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const category = btn.getAttribute('data-category');
                    deleteCategory(category);
                });
            });
        }

        function addCategory(categoryName) {
            const normalized = categoryName.trim();
            const color = document.getElementById('newCategoryColor').value || '#ff6fe7';
            if (!normalized) {
                showMessageModal('Ingresa un nombre de categoría válido.', 'Error');
                return;
            }
            if (categorias.some(cat => cat.name.toLowerCase() === normalized.toLowerCase())) {
                showMessageModal('La categoría ya existe.', 'Error');
                return;
            }
            categorias.push({ name: normalized, color });
            saveData();
            updateCategoryStyles();
            renderCategoryList();
            showMessageModal(`Categoría '${normalized}' agregada.`, 'Éxito');
        }

        async function deleteCategory(categoryName) {
            const confirmed = await openConfirmationModal(`¿Eliminar la categoría "${categoryName}"? Esto también borrará los votos asociados a esa categoría.`, true);
            if (!confirmed) return;
            categorias = categorias.filter(cat => cat.name !== categoryName);
            for (const user in votos) {
                if (votos[user] && votos[user][categoryName]) {
                    delete votos[user][categoryName];
                }
            }
            saveData();
            updateCategoryStyles();
            renderCategoryList();
            loadRanking();
            showMessageModal(`Categoría '${categoryName}' eliminada.`, 'Éxito');
        }

        function openConfirmationModal(message, isDangerous = false) {
            const modal = document.getElementById('confirmationModal');
            const titleEl = document.getElementById('confirmationModalTitle');
            const messageEl = document.getElementById('confirmationModalMessage');
            const confirmBtn = document.getElementById('confirmationConfirmBtn');
            const modalContent = modal.querySelector('.modal-content');
            
            messageEl.textContent = message;
            
            if (isDangerous) {
                titleEl.textContent = '⚠️ Confirmación Requerida';
                confirmBtn.textContent = 'Sí, continuar';
                confirmBtn.style.backgroundColor = '#dc3545';
                confirmBtn.style.color = '#fff';
                modalContent.style.borderLeft = '4px solid #dc3545';
            } else {
                titleEl.textContent = 'Confirmación';
                confirmBtn.textContent = 'Confirmar';
                confirmBtn.style.backgroundColor = '#007bff';
                confirmBtn.style.color = '#fff';
                modalContent.style.borderLeft = '4px solid #007bff';
            }
            
            modal.style.display = 'block';

            return new Promise(resolve => {
                const onConfirm = () => {
                    cleanup();
                    resolve(true);
                };
                const onCancel = () => {
                    cleanup();
                    resolve(false);
                };
                const cleanup = () => {
                    modal.style.display = 'none';
                    document.getElementById('confirmationConfirmBtn').removeEventListener('click', onConfirm);
                    document.getElementById('confirmationCancelBtn').removeEventListener('click', onCancel);
                    document.getElementById('confirmationModalClose').removeEventListener('click', onCancel);
                    window.removeEventListener('click', outsideClick);
                };
                const outsideClick = (event) => {
                    if (event.target === modal) {
                        onCancel();
                    }
                };
                document.getElementById('confirmationConfirmBtn').addEventListener('click', onConfirm);
                document.getElementById('confirmationCancelBtn').addEventListener('click', onCancel);
                document.getElementById('confirmationModalClose').addEventListener('click', onCancel);
                window.addEventListener('click', outsideClick);
            });
        }

        async function clearAllVotes() {
            const response = await fetch('/api/clear-all-votes', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'}
            });
            const data = await response.json();
            if (!data.success) {
                throw new Error(data.error || 'No se pudo eliminar los votos.');
            }
            votos = {};
            saveData();
            loadRanking();
            showMessageModal('Todos los votos han sido eliminados.', 'Éxito');
        }

        async function setVotingEnabled(enabled) {
            const response = await fetch('/api/set-voting-status', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({enabled})
            });
            const data = await response.json();
            if (!data.success) {
                throw new Error(data.error || 'No se pudo actualizar el estado de votación.');
            }
            votingEnabled = enabled;
            updateVotingUI(enabled);
            const message = enabled ? 'Votaciones reactivadas.' : 'Votaciones bloqueadas.';
            showMessageModal(message, 'Éxito');
        }

        function showMessageModal(message, title = 'Aviso') {
            const modal = document.getElementById('messageModal');
            document.getElementById('messageModalTitle').textContent = title;
            document.getElementById('messageModalMessage').textContent = message;
            modal.style.display = 'block';

            const closeModal = () => {
                modal.style.display = 'none';
                document.getElementById('messageModalOkBtn').removeEventListener('click', closeModal);
                document.getElementById('messageModalClose').removeEventListener('click', closeModal);
                window.removeEventListener('click', outsideClick);
            };

            const outsideClick = (event) => {
                if (event.target === modal) {
                    closeModal();
                }
            };

            document.getElementById('messageModalOkBtn').addEventListener('click', closeModal);
            document.getElementById('messageModalClose').addEventListener('click', closeModal);
            window.addEventListener('click', outsideClick);
        }

        function loadRanking() {
            const categories = categorias.length ? categorias : defaultCategorias;
            const ranking = {};
            categories.forEach(cat => ranking[cat.name] = {});
            
            for (const userVotes of Object.values(votos)) {
                for (const [cat, candId] of Object.entries(userVotes)) {
                    if (!ranking[cat]) ranking[cat] = {};
                    if (!ranking[cat][candId]) ranking[cat][candId] = 0;
                    ranking[cat][candId]++;
                }
            }
            
            let html = '';
            categories.forEach(cat => {
                const counts = ranking[cat.name] || {};
                const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
                const className = slugify(cat.name);
                html += `<div class="${className}"><h3>${cat.name}</h3><ul>`;
                sorted.forEach(([id, count]) => {
                    const candidata = candidatas.find(c => c.id == id);
                    if (candidata) {
                        html += `<li>${candidata.nombre} (${candidata.numero}) - ${count} votos</li>`;
                    }
                });
                html += '</ul></div>';
            });
            document.getElementById('rankingContent').innerHTML = html;
        }

        function loadCandidatas() {
            displayCandidatasAdmin();
            loadRanking();
        }

        function displayCandidatasAdmin() {
            let html = '';
            candidatas.forEach(c => {
                html += `
                    <div class="candidata-card-admin">
                        <img src="${c.foto || 'img/default.jpg'}" alt="${c.nombre}">
                        <h4>${c.nombre}</h4>
                        <p>Número: ${c.numero}</p>
                        <button onclick="eliminarCandidata(${c.id})">Eliminar</button>
                    </div>
                `;
            });
            document.getElementById('candidatasGridAdmin').innerHTML = html;
        }

        document.getElementById('addCandidataForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const ano = document.getElementById('ano').value;
            const descripcion = document.getElementById('descripcion').value;
            const cancion = document.getElementById('cancion').value;
            const numero = document.getElementById('numero').value;
            const foto = document.getElementById('foto').files[0];
            
            let fotoUrl = null;
            if (foto) {
                const formData = new FormData();
                formData.append('foto', foto);
                formData.append('numero', numero);
                const response = await fetch('/api/upload-candidata-foto', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (!response.ok || !result.success) {
                    console.log('Mostrando alerta de error guardando imagen');
                    alert('Error guardando la imagen de la candidata');
                    return;
                }
                fotoUrl = result.foto;
            }
            
            const candidata = { id: Date.now(), nombre, ano, descripcion, cancion, numero, foto: fotoUrl };
            candidatas.push(candidata);
            saveData();
            loadCandidatas();
            e.target.reset();
            console.log('Mostrando alerta: Candidata agregada correctamente');
            alert('Candidata agregada correctamente');
        });

        function eliminarCandidata(id) {
            candidatas = candidatas.filter(c => c.id != id);
            // Limpiar votos de esta candidata en todos los usuarios
            for (const user in votos) {
                for (const [cat, candId] of Object.entries(votos[user])) {
                    if (candId == id) {
                        delete votos[user][cat];
                    }
                }
            }
            saveData();
            loadCandidatas();
        }
        window.eliminarCandidata = eliminarCandidata;

        function loadUsuarios() {
            const users = usuarios.filter(u => u.role !== 'admin');
            let html = '';
            users.forEach(u => {
                html += `<div>${u.username} <button onclick="eliminarUsuario('${u.username}')">Eliminar</button></div>`;
            });
            document.getElementById('usuariosList').innerHTML = html;
        }

        document.getElementById('addUserForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('userUsername').value;
            const password = document.getElementById('userPassword').value;
            usuarios.push({ username, password, role: 'user' });
            saveData();
            loadUsuarios();
            e.target.reset();
        });

        document.getElementById('addCategoryForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('newCategory').value;
            addCategory(name);
            e.target.reset();
        });

        function eliminarUsuario(username) {
            usuarios = usuarios.filter(u => u.username !== username);
            delete votos[username];
            saveData();
            loadUsuarios();
        }
        window.eliminarUsuario = eliminarUsuario;

        renderCategoryList();
        loadCandidatas();
        loadUsuarios();
        checkVotingStatus();

        let votingStatusInterval;
        startVotingStatusPolling();

        document.getElementById('clearVotesBtn').addEventListener('click', async () => {
            const confirmed = await openConfirmationModal('¿Estás seguro de que quieres eliminar TODOS los votos? Esta acción no se puede deshacer.', true);
            if (!confirmed) return;

            try {
                await clearAllVotes();
            } catch (error) {
                console.log('Error eliminando votos:', error);
                showMessageModal('Error al eliminar votos.', 'Error');
            }
        });

        document.getElementById('blockVotingBtn').addEventListener('click', async () => {
            const confirmed = await openConfirmationModal('¿Bloquear votaciones? Los usuarios no podrán votar hasta que se reactive.', true);
            if (!confirmed) return;

            try {
                await setVotingEnabled(false);
            } catch (error) {
                console.log('Error bloqueando votaciones:', error);
                showMessageModal('Error al bloquear votaciones.', 'Error');
            }
        });

        document.getElementById('enableVotingBtn').addEventListener('click', async () => {
            try {
                await setVotingEnabled(true);
            } catch (error) {
                console.log('Error reactivando votaciones:', error);
                showMessageModal('Error al reactivar votaciones.', 'Error');
            }
        });

        function updateVotingUI(enabled) {
            const blockBtn = document.getElementById('blockVotingBtn');
            const enableBtn = document.getElementById('enableVotingBtn');
            const statusDiv = document.getElementById('votingStatus');

            if (enabled) {
                blockBtn.style.display = 'inline-block';
                enableBtn.style.display = 'none';
                statusDiv.textContent = 'Estado: Votaciones activas';
                statusDiv.style.color = '#4CAF50';
            } else {
                blockBtn.style.display = 'none';
                enableBtn.style.display = 'inline-block';
                statusDiv.textContent = 'Estado: Votaciones bloqueadas';
                statusDiv.style.color = '#f44336';
            }
        }

        async function checkVotingStatus() {
            try {
                const response = await fetch('/api/get-voting-status');
                const data = await response.json();
                votingEnabled = data.voting_enabled;
                updateVotingUI(votingEnabled);
            } catch (error) {
                console.log('Error obteniendo estado de votación:', error);
            }
        }

        function startVotingStatusPolling() {
            // Verificar estado cada 2 segundos
            votingStatusInterval = setInterval(checkVotingStatus, 2000);
        }

        function stopVotingStatusPolling() {
            if (votingStatusInterval) {
                clearInterval(votingStatusInterval);
            }
        }

        document.getElementById('logout').addEventListener('click', async () => {
            stopVotingStatusPolling();
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: currentUser.username
                    })
                });
            } catch (error) {
                console.log('Error al cerrar sesión:', error);
            }
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
        }
    </script>
</body>
</html>
