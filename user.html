<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votación</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Elecciones Reina de Colegios</h1>
    <button id="logout">Cerrar Sesión</button>
    <div id="votingStatusBanner" style="margin: 10px 0; font-weight: bold;"></div>
    <div id="ranking">
        <h2>Ranking Actual</h2>
        <div id="rankingContent"></div>
    </div>
    <input type="text" id="search" placeholder="Buscar por nombre o número">
    <div id="candidatasGrid"></div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="candidataDetails"></div>
        </div>
    </div>
    <script>
        // Función para verificar que la sesión es válida
        async function verifySession() {
            let currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                window.location.href = 'index.html';
                return false;
            }
            
            try {
                const response = await fetch('/api/verify-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: currentUser.username,
                        session_id: currentUser.session_id,
                        device_id: currentUser.device_id
                    })
                });
                
                const data = await response.json();
                
                if (!data.valid) {
                    // Sesión inválida - otro dispositivo está usando esta cuenta
                    localStorage.removeItem('currentUser');
                    alert('⚠️ Sesión expirada: Tu usuario está conectado desde otro dispositivo');
                    window.location.href = 'index.html';
                    return false;
                }
                return true;
            } catch (error) {
                // Si el servidor no responde, asumir que es válido (fallback)
                console.log('Verificación de sesión: modo fallback');
                return true;
            }
        }
        
        // Verificar sesión al cargar
        verifySession().then(valid => {
            if (valid) {
                initVoting();
            }
        });
        
        // Variables globales
        let currentUser;
        let candidatas = [];
        let votos = {};
        let votingEnabled = true;
        
        function saveVotos() {
            localStorage.setItem('votos', JSON.stringify(votos));
            
            // Guardar votos en servidor
            fetch('/api/save-votos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({votos})
            }).catch(e => console.log('Error guardando votos:', e));
        }

        function loadRanking() {
            // Calcular ranking basado en votos
            const categories = ['Reina', 'Primera Princesa', 'Segunda Princesa', 'Primera Dama de Honor', 'Segunda Dama de Honor'];
            const ranking = {};
            categories.forEach(cat => ranking[cat] = {});
            
            for (const userVotes of Object.values(votos)) {
                for (const [cat, candId] of Object.entries(userVotes)) {
                    if (!ranking[cat][candId]) ranking[cat][candId] = 0;
                    ranking[cat][candId]++;
                }
            }
            
            let html = '';
            categories.forEach(cat => {
                const counts = ranking[cat] || {};
                const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
                html += `<h3>${cat}</h3><ul>`;
                sorted.forEach(([id, count]) => {
                    const candidata = candidatas.find(c => c.id == id);
                    if (candidata) {
                        html += `<li>${candidata.nombre} (${candidata.numero}) - ${count} votos</li>`;
                    }
                });
                html += '</ul>';
            });
            document.getElementById('rankingContent').innerHTML = html;
        }

        function displayCandidatas(list) {
            let html = '';
            list.forEach(c => {
                html += `
                    <div class="candidata-card" onclick="showDetails(${c.id})">
                        <img src="${c.foto || 'img/default.jpg'}" alt="${c.nombre}">
                        <h3>${c.nombre}</h3>
                        <p>Número: ${c.numero}</p>
                    </div>
                `;
            });
            document.getElementById('candidatasGrid').innerHTML = html;
        }

        function showDetails(id) {
            const c = candidatas.find(cand => cand.id == id);
            if (c) {
                const userVotes = votos[currentUser.username] || {};
                const categories = ['Reina', 'Primera Princesa', 'Segunda Princesa', 'Primera Dama de Honor', 'Segunda Dama de Honor'];
                
                // Encontrar qué categoría está votada para esta candidata
                let votedCategory = null;
                for (const [cat, votedId] of Object.entries(userVotes)) {
                    if (votedId == id) {
                        votedCategory = cat;
                        break;
                    }
                }

                let detailsHtml = `
                    <img src="${c.foto || 'img/default.jpg'}" alt="${c.nombre}" style="max-width:100%">
                    <h2>${c.nombre}</h2>
                    <p><strong>Año:</strong> ${c.ano}</p>
                    <p><strong>Descripción:</strong> ${c.descripcion}</p>
                    <p><strong>Canción:</strong> ${c.cancion}</p>
                    <p><strong>Número:</strong> ${c.numero}</p>
                `;

                if (!votingEnabled) {
                    detailsHtml += `<p style="color:#f44336; font-weight:bold; margin-top:20px;">Las votaciones están bloqueadas. No se pueden cambiar votos en este momento.</p>`;
                    document.getElementById('candidataDetails').innerHTML = detailsHtml;
                    modal.style.display = 'block';
                    return;
                }

                let optionsHtml = '';
                categories.forEach(cat => {
                    optionsHtml += `<label><input type="radio" name="categoria" value="${cat}" ${votedCategory === cat ? 'checked' : ''}> ${cat}</label>`;
                });
                
                document.getElementById('candidataDetails').innerHTML = `
                    ${detailsHtml}
                    <form id="voteForm">
                        <div class="vote-options">
                            ${optionsHtml}
                        </div>
                        <div class="button-group">
                            <button type="submit">Votar</button>
                            ${votedCategory ? `<button type="button" id="deleteVoteBtn">Eliminar Voto</button>` : ''}
                        </div>
                    </form>
                `;
                modal.style.display = 'block';
                document.getElementById('voteForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const categoria = document.querySelector('input[name="categoria"]:checked');
                    if (categoria) {
                        votar(id, categoria.value);
                    }
                });
                
                // Agregar evento al botón Eliminar Voto si existe
                const deleteBtn = document.getElementById('deleteVoteBtn');
                if (deleteBtn) {
                    deleteBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        eliminarVoto(votedCategory);
                    });
                }
            }
        }

        function votar(candId, categoria) {
            if (!votos[currentUser.username]) votos[currentUser.username] = {};
            const userVotes = votos[currentUser.username];
            
            // Primero, buscar si esta candidata ya tiene un voto en otra categoría
            // Si existe, eliminarlo (garantiza que cada candidata solo tenga UN voto por usuario)
            for (const [cat, votedCandId] of Object.entries(userVotes)) {
                if (votedCandId == candId && cat !== categoria) {
                    delete userVotes[cat];
                }
            }
            
            // Asignar el nuevo voto a la categoría seleccionada
            userVotes[categoria] = candId;
            
            saveVotos();
            loadRanking();
            modal.style.display = 'none';
        }

        function eliminarVoto(categoria) {
            if (!votos[currentUser.username]) return;
            const userVotes = votos[currentUser.username];
            
            // Eliminar el voto de esta categoría
            delete userVotes[categoria];
            
            saveVotos();
            loadRanking();
            modal.style.display = 'none';
        }

        function initVoting() {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            candidatas = JSON.parse(localStorage.getItem('candidatas')) || [];
            votos = JSON.parse(localStorage.getItem('votos')) || {};

            // Cargar datos del servidor
            fetch('/api/load-data')
                .then(response => response.json())
                .then(data => {
                    if (data.candidatas) {
                        candidatas = data.candidatas;
                        localStorage.setItem('candidatas', JSON.stringify(candidatas));
                    }
                    if (data.votos) {
                        votos = data.votos;
                        localStorage.setItem('votos', JSON.stringify(votos));
                    }
                    
                            displayCandidatas(candidatas);
                    loadRanking();
                })
                .catch(e => {
                    console.log('Error cargando datos del servidor, usando datos locales:', e);
                    displayCandidatas(candidatas);
                    loadRanking();
                });

            checkVotingStatus();
            startVotingStatusPolling();

            // Configurar event listeners después de cargar datos
            document.getElementById('search').addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                const filtered = candidatas.filter(c =>
                    c.nombre.toLowerCase().includes(query) ||
                    c.numero.toString().includes(query)
                );
                displayCandidatas(filtered);
            });

            const modal = document.getElementById('modal');
            const closeBtn = document.getElementsByClassName('close')[0];

            closeBtn.onclick = () => modal.style.display = 'none';
            window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
        }

        let votingStatusInterval; // Para guardar el intervalo

        async function checkVotingStatus() {
            try {
                const response = await fetch('/api/get-voting-status');
                const data = await response.json();
                const wasEnabled = votingEnabled;
                votingEnabled = data.voting_enabled;
                
                const banner = document.getElementById('votingStatusBanner');
                if (votingEnabled) {
                    banner.textContent = '✅ Votaciones activas';
                    banner.style.color = '#4CAF50';
                } else {
                    banner.textContent = '🚫 Votaciones bloqueadas: no se pueden cambiar votos actualmente';
                    banner.style.color = '#f44336';
                }
                
                // Detectar cambio de estado y mostrar alerta
                if (wasEnabled !== votingEnabled) {
                    if (!votingEnabled) {
                        console.log('Las votaciones han sido bloqueadas');
                    } else {
                        console.log('Las votaciones han sido reactivadas');
                    }
                }
            } catch (error) {
                console.log('Error obteniendo estado de votación:', error);
            }
        }

        function startVotingStatusPolling() {
            // Verificar estado cada 2 segundos
            votingStatusInterval = setInterval(checkVotingStatus, 2000);
        }

        function stopVotingStatusPolling() {
            if (votingStatusInterval) {
                clearInterval(votingStatusInterval);
            }
        }

        document.getElementById('logout').addEventListener('click', async () => {
            stopVotingStatusPolling();
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: currentUser.username
                    })
                });
            } catch (error) {
                console.log('Error al cerrar sesión:', error);
            }
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
